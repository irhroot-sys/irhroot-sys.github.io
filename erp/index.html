    <!-- ═══════════════════════════ MAIN CONTENT ═══════════════════════════ -->

  <!-- MODAL CONTAINER -->

  <!-- ═══════════════════════════════════════════════════════════════════════ -->
  <!--  MODULE TEMPLATES  (hidden, cloned and rendered by erp.js)            -->
  <!-- ═══════════════════════════════════════════════════════════════════════ -->

  <!-- ─────────────── DASHBOARD ─────────────── -->
  <template id="tpl-dashboard">
    <div class="module-header">
      <div>
        <div class="module-title" data-en="Dashboard" data-ar="لوحة التحكم">Dashboard</div>
        <div class="module-subtitle" data-en="Overview of your business operations"
          data-ar="نظرة عامة على عمليات أعمالك">Overview of your business operations</div>
      </div>
      <div class="flex gap-2">
        <button class="btn btn-secondary btn-sm" id="dashRefresh">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <polyline points="23 4 23 10 17 10" />
            <polyline points="1 20 1 14 7 14" />
            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15" />
          </svg>
          <span data-en="Refresh" data-ar="تحديث">Refresh</span>
        </button>
      </div>
    </div>

    <!-- KPI Stats Grid -->
    <div class="stats-grid" id="dashStats"></div>

    <!-- Charts Row -->
    <div class="charts-grid">
      <div class="card">
        <div class="table-header">
          <div class="table-title" data-en="Revenue vs Expenses (6 months)"
            data-ar="الإيرادات مقابل المصروفات (6 أشهر)">Revenue vs Expenses (6 months)</div>
        </div>
        <div style="padding:20px"><canvas id="revenueChart" height="200"></canvas></div>
      </div>
      <div class="card">
        <div class="table-header">
          <div class="table-title" data-en="Inventory by Category" data-ar="المخزون حسب الفئة">Inventory by Category
          </div>
        </div>
        <div style="padding:20px"><canvas id="inventoryChart" height="200"></canvas></div>
      </div>
    </div>

    <!-- Recent Invoices + Recent Expenses -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
      <div class="table-container">
        <div class="table-header">
          <div class="table-title" data-en="Recent Invoices" data-ar="آخر الفواتير">Recent Invoices</div>
          <a href="#" class="btn btn-secondary btn-sm" data-module-link="invoices" data-en="View All"
            data-ar="عرض الكل">View All</a>
        </div>
        <div id="dashRecentInvoices"></div>
      </div>
      <div class="table-container">
        <div class="table-header">
          <div class="table-title" data-en="Recent Expenses" data-ar="آخر المصروفات">Recent Expenses</div>
          <a href="#" class="btn btn-secondary btn-sm" data-module-link="expenses" data-en="View All"
            data-ar="عرض الكل">View All</a>
        </div>
        <div id="dashRecentExpenses"></div>
      </div>
    </div>
  </template>

  <!-- ─────────────── INVOICES ─────────────── -->
  <template id="tpl-invoices">
    <div class="module-header">
      <div>
        <div class="module-title" data-en="Invoices" data-ar="الفواتير">Invoices</div>
        <div class="module-subtitle" data-en="ZATCA-compliant B2B invoices"
          data-ar="فواتير تجارية متوافقة مع هيئة الزكاة والضريبة">ZATCA-compliant B2B invoices</div>
      </div>
      <div class="flex gap-2">
        <button class="btn btn-secondary btn-sm" id="invoiceExportExcel">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
            <polyline points="14 2 14 8 20 8" />
            <line x1="12" y1="18" x2="12" y2="12" />
            <line x1="9" y1="15" x2="15" y2="15" />
          </svg>
          <span data-en="Export Excel" data-ar="تصدير Excel">Export Excel</span>
        </button>
        <button class="btn btn-primary" id="newInvoiceBtn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="5" x2="12" y2="19" />
            <line x1="5" y1="12" x2="19" y2="12" />
          </svg>
          <span data-en="New Invoice" data-ar="فاتورة جديدة">New Invoice</span>
        </button>
      </div>
    </div>

    <!-- Status filter tabs -->
    <div class="tabs" id="invoiceTabs">
      <div class="tab active" data-filter="all" data-en="All" data-ar="الكل">All</div>
      <div class="tab" data-filter="draft" data-en="Draft" data-ar="مسودة">Draft</div>
      <div class="tab" data-filter="sent" data-en="Sent" data-ar="مرسلة">Sent</div>
      <div class="tab" data-filter="paid" data-en="Paid" data-ar="مدفوعة">Paid</div>
      <div class="tab" data-filter="overdue" data-en="Overdue" data-ar="متأخرة">Overdue</div>
    </div>

    <div class="table-container">
      <div class="table-header">
        <div class="search-bar">
          <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
          </svg>
          <input type="text" class="form-control" id="invoiceSearch" data-placeholder-en="Search invoices..."
            data-placeholder-ar="بحث في الفواتير..." placeholder="Search invoices...">
        </div>
        <div class="flex gap-2">
          <select class="form-control" style="width:auto" id="invoiceDateFilter">
            <option value="" data-en="All Time" data-ar="كل الوقت">All Time</option>
            <option value="this_month" data-en="This Month" data-ar="هذا الشهر">This Month</option>
            <option value="last_month" data-en="Last Month" data-ar="الشهر الماضي">Last Month</option>
            <option value="this_year" data-en="This Year" data-ar="هذه السنة">This Year</option>
          </select>
        </div>
      </div>
      <div id="invoicesList"></div>
    </div>
  </template>

  <!-- ─────────────── SALES ─────────────── -->
  <template id="tpl-sales">
    <div class="module-header">
      <div>
        <div class="module-title" data-en="Sales" data-ar="المبيعات">Sales</div>
        <div class="module-subtitle" data-en="Daily sales transactions" data-ar="معاملات المبيعات اليومية">Daily sales
          transactions</div>
      </div>
      <div class="flex gap-2">
        <button class="btn btn-secondary btn-sm" id="salesExportExcel">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
            <polyline points="7 10 12 15 17 10" />
            <line x1="12" y1="15" x2="12" y2="3" />
          </svg>
          <span data-en="Export" data-ar="تصدير">Export</span>
        </button>
        <button class="btn btn-primary" id="newSaleBtn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="5" x2="12" y2="19" />
            <line x1="5" y1="12" x2="19" y2="12" />
          </svg>
          <span data-en="New Sale" data-ar="بيع جديد">New Sale</span>
        </button>
      </div>
    </div>

    <div class="stats-grid" id="salesStats" style="grid-template-columns:repeat(4,1fr)"></div>

    <div class="table-container">
      <div class="table-header">
        <div class="search-bar">
          <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
          </svg>
          <input type="text" class="form-control" id="salesSearch" data-placeholder-en="Search sales..."
            data-placeholder-ar="بحث في المبيعات..." placeholder="Search sales...">
        </div>
        <input type="month" class="form-control" id="salesMonthFilter" style="width:auto">
      </div>
      <div id="salesList"></div>
    </div>
  </template>

  <!-- ─────────────── PURCHASES ─────────────── -->
  <template id="tpl-purchases">

            <line x1="17" y1="11" x2="23" y2="11" />
          </svg>
          <span data-en="New User" data-ar="مستخدم جديد">New User</span>
        </button>
      </div>
    </div>

    <div class="stats-grid" id="userMgmtStats" style="grid-template-columns:repeat(3,1fr)"></div>

    <div class="tabs">
      <div class="tab active" id="tabUsersList" data-en="Users" data-ar="المستخدمون">Users</div>
      <div class="tab" id="tabRolesList" data-en="Roles" data-ar="الأدوار">Roles</div>
    </div>

    <div class="table-container" id="usersContainer">
      <div class="table-header">
        <div class="search-bar">
          <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
          </svg>
          <input type="text" class="form-control" id="userSearch" data-placeholder-en="Search users..."
            data-placeholder-ar="بحث في المستخدمين..." placeholder="Search users...">
        </div>
      </div>
      <div id="usersList"></div>
    </div>

    <div class="table-container" id="rolesContainer" style="display:none">
      <div class="table-header">
        <div class="search-bar">
          <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
          </svg>
          <input type="text" class="form-control" id="roleSearch" data-placeholder-en="Search roles..."
            data-placeholder-ar="بحث في الأدوار..." placeholder="Search roles...">
        </div>
      </div>
      <div id="rolesList"></div>
    </div>
  </template>

  <!-- ─────────────── SETTINGS ─────────────── -->
  <template id="tpl-settings">
    <div class="module-header">
      <div>
        <div class="module-title" data-en="Settings" data-ar="الإعدادات">Settings</div>
        <div class="module-subtitle" data-en="System configuration and preferences" data-ar="تكوين النظام والتفضيلات">
          System configuration and preferences</div>
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">

      <!-- Company Information -->
      <div class="card">
        <h3 style="font-size:1rem;font-weight:700;margin-bottom:16px" data-en="Company Information"
          data-ar="معلومات الشركة">Company Information</h3>
        <div class="form-group">
          <label class="form-label" data-en="Company Name (English)" data-ar="اسم الشركة (إنجليزي)">Company Name
            (English)</label>
          <input type="text" class="form-control" id="settCompanyNameEn">
        </div>
        <div class="form-group">
          <label class="form-label" data-en="Company Name (Arabic)" data-ar="اسم الشركة (عربي)">Company Name
            (Arabic)</label>
          <input type="text" class="form-control" id="settCompanyNameAr">
        </div>
        <div class="form-group">
          <label class="form-label" data-en="Address" data-ar="العنوان">Address</label>
          <textarea class="form-control" id="settAddress" rows="2"></textarea>
        </div>
        <div class="form-grid">
          <div class="form-group">
            <label class="form-label" data-en="Phone" data-ar="الهاتف">Phone</label>
            <input type="tel" class="form-control" id="settPhone">
          </div>
          <div class="form-group">
            <label class="form-label" data-en="Email" data-ar="البريد الإلكتروني">Email</label>
            <input type="email" class="form-control" id="settEmail">
          </div>
        </div>
        <div class="form-grid">
          <div class="form-group">
            <label class="form-label" data-en="City" data-ar="المدينة">City</label>
            <input type="text" class="form-control" id="settCity">
          </div>
          <div class="form-group">
            <label class="form-label" data-en="Website" data-ar="الموقع الإلكتروني">Website</label>
            <input type="url" class="form-control" id="settWebsite">
          </div>
        </div>
      </div>

      <!-- Tax & ZATCA Settings -->
      <div class="card">
        <h3 style="font-size:1rem;font-weight:700;margin-bottom:16px" data-en="Tax &amp; ZATCA Settings"
          data-ar="إعدادات الضرائب وهيئة الزكاة">Tax &amp; ZATCA Settings</h3>
        <div class="form-group">
          <label class="form-label" data-en="VAT Registration Number" data-ar="رقم تسجيل ضريبة القيمة المضافة">VAT
            Registration Number</label>
          <input type="text" class="form-control" id="settVatNumber" placeholder="3XXXXXXXXXXXXXXXXXXX">
        </div>
        <div class="form-group">
          <label class="form-label" data-en="Commercial Registration (CR)" data-ar="السجل التجاري">Commercial
            Registration (CR)</label>
          <input type="text" class="form-control" id="settCrNumber">
        </div>
        <div class="form-group">
          <label class="form-label" data-en="VAT Rate (%)" data-ar="نسبة ضريبة القيمة المضافة (%)">VAT Rate (%)</label>
          <input type="number" class="form-control" id="settVatRate" value="15" min="0" max="100">
        </div>
        <div class="form-group">
          <label class="form-label" data-en="Currency" data-ar="العملة">Currency</label>
          <select class="form-control" id="settCurrency">
            <option value="SAR">SAR — Saudi Riyal (ريال سعودي)</option>
            <option value="USD">USD — US Dollar</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label" data-en="Default Invoice Terms (days)"
            data-ar="شروط الفاتورة الافتراضية (أيام)">Default Invoice Terms (days)</label>
          <input type="number" class="form-control" id="settInvoiceTerms" value="30">
        </div>
        <div class="form-group">
          <label class="form-label" data-en="Invoice Notes (default)" data-ar="ملاحظات الفاتورة (افتراضي)">Invoice Notes
            (default)</label>
          <textarea class="form-control" id="settInvoiceNotes" rows="2"></textarea>
        </div>
      </div>

      <!-- Document Numbering -->
      <div class="card">
        <h3 style="font-size:1rem;font-weight:700;margin-bottom:16px" data-en="Document Numbering"
          data-ar="ترقيم المستندات">Document Numbering</h3>
        <div class="form-grid">
          <div class="form-group">
            <label class="form-label" data-en="Invoice Prefix" data-ar="بادئة الفاتورة">Invoice Prefix</label>
            <input type="text" class="form-control" id="settInvPrefix" value="INV-">
          </div>
          <div class="form-group">
            <label class="form-label" data-en="Next Invoice #" data-ar="رقم الفاتورة التالي">Next Invoice #</label>
            <input type="number" class="form-control" id="settInvNext" value="1001">
          </div>
          <div class="form-group">
            <label class="form-label" data-en="Document Prefix" data-ar="بادئة المستند">Document Prefix</label>
            <input type="text" class="form-control" id="settDocPrefix" value="DOC-">
          </div>
          <div class="form-group">
            <label class="form-label" data-en="Next Document #" data-ar="رقم المستند التالي">Next Document #</label>
            <input type="number" class="form-control" id="settDocNext" value="1001">
          </div>
        </div>
      </div>

      <!-- System Preferences -->
      <div class="card">
        <h3 style="font-size:1rem;font-weight:700;margin-bottom:16px" data-en="System Preferences"
          data-ar="تفضيلات النظام">System Preferences</h3>
        <div class="form-group">
          <label class="form-label" data-en="Default Language" data-ar="اللغة الافتراضية">Default Language</label>
          <select class="form-control" id="settDefaultLang">
            <option value="en">English</option>
            <option value="ar">العربية</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label" data-en="Date Format" data-ar="صيغة التاريخ">Date Format</label>
          <select class="form-control" id="settDateFormat">
            <option value="YYYY-MM-DD">YYYY-MM-DD</option>
            <option value="DD/MM/YYYY">DD/MM/YYYY</option>
            <option value="MM/DD/YYYY">MM/DD/YYYY</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label" data-en="Weight Unit" data-ar="وحدة الوزن">Weight Unit</label>
          <select class="form-control" id="settWeightUnit">
            <option value="ton" data-en="Metric Ton" data-ar="طن متري">Metric Ton</option>
            <option value="kg" data-en="Kilogram" data-ar="كيلوغرام">Kilogram</option>
          </select>
        </div>
        <hr class="divider">
        <h4 style="font-size:0.875rem;font-weight:700;margin-bottom:12px;color:#ef4444" data-en="Data Management"
          data-ar="إدارة البيانات">Data Management</h4>
        <div class="flex gap-2">
          <button class="btn btn-secondary btn-sm" id="settExportData">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
              <polyline points="7 10 12 15 17 10" />
              <line x1="12" y1="15" x2="12" y2="3" />
            </svg>
            <span data-en="Export All Data" data-ar="تصدير كل البيانات">Export All Data</span>
          </button>
          <button class="btn btn-danger btn-sm" id="settClearData">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <polyline points="3 6 5 6 21 6" />
              <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6" />
              <path d="M10 11v6" />
              <path d="M14 11v6" />
              <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2" />
            </svg>
            <span data-en="Clear All Data" data-ar="مسح كل البيانات">Clear All Data</span>
          </button>
        </div>
      </div>

    </div>

    <div style="margin-top:20px;text-align:right">
      <button class="btn btn-primary" id="settSaveBtn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z" />
          <polyline points="17 21 17 13 7 13 7 21" />
          <polyline points="7 3 7 8 15 8" />
        </svg>
        <span data-en="Save Settings" data-ar="حفظ الإعدادات">Save Settings</span>
      </button>
    </div>
  </template>
  <!-- ═══════════════════════════ END TEMPLATES ═══════════════════════════ -->

  <script src="erp.js" defer></script>
</body>

</html>
