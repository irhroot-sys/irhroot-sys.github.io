# Copilot coding-agent setup steps
# Runs before the agent begins work.
#
# Purpose:
#   The agent's internal diff tooling calls `git diff main ...HEAD` to
#   summarise what changed on the working branch.  A shallow checkout
#   that only fetches the working branch does not include a local `main`
#   ref, which causes the `git` call to exit with code 128
#   ("fatal: ambiguous argument 'main': unknown revision").
#   Fetching the tip of `main` here resolves that error.

steps:
  - name: Fetch main branch for diff comparisons
    run: |
      git fetch origin main:main --depth=1 2>/dev/null || true
