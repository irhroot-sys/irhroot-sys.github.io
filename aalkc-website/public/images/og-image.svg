<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#0a1f2e"/>
  <!-- Subtle grid pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1a6a96" stroke-width="0.5" opacity="0.3"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <!-- Accent bar -->
  <rect x="0" y="0" width="1200" height="6" fill="#e8a317"/>
  <!-- Company name EN -->
  <text x="600" y="230" font-family="Arial, sans-serif" font-size="56" font-weight="bold" fill="#ffffff" text-anchor="middle">Amanat Al-Kalima Company</text>
  <!-- Company name AR -->
  <text x="600" y="295" font-family="Arial, sans-serif" font-size="40" fill="#1a6a96" text-anchor="middle">شركة أمانات الكلمة</text>
  <!-- Divider -->
  <rect x="460" y="320" width="280" height="3" fill="#e8a317" rx="2"/>
  <!-- Tagline -->
  <text x="600" y="375" font-family="Arial, sans-serif" font-size="28" fill="#a0c4d8" text-anchor="middle">Scrap Metal Buyers — Eastern Province</text>
  <text x="600" y="415" font-family="Arial, sans-serif" font-size="24" fill="#718096" text-anchor="middle">شراء الخردة والمعادن · المنطقة الشرقية</text>
  <!-- Domain -->
  <text x="600" y="490" font-family="Arial, sans-serif" font-size="22" fill="#e8a317" text-anchor="middle">aalkc.com</text>
  <!-- Rating -->
  <text x="600" y="540" font-family="Arial, sans-serif" font-size="18" fill="#718096" text-anchor="middle">★ 5.0 Google Rating · 8+ Years · 483+ Clients</text>
</svg>
